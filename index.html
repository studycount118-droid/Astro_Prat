<!DOCTYPE html>
<html lang="en">
<head>
    <title>Prat's Webpage</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;   
            align-items: center;       
            justify-content: center;    
            min-height: 100vh;         
            background-image: linear-gradient(to bottom, violet, pink, blue);
            font-family: cursive, Impact, Haettenschweiler;
            text-align: center;
        }

        /* --- THE MISSING CIRCLE STYLES --- */
        .circle-logo {
            border-radius: 50%;
            aspect-ratio: 1 / 1; /* Makes it a square */
            object-fit: cover;   /* Prevents stretching */
            border: 2px solid white; /* Optional: makes it pop! */
        }

        .circle_logo1 {
            border-radius: 50%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        #live-clock {
            font-size: 24px;
            font-weight: bold;
            font-style: italic;
            margin-bottom: 20px;
            color: black;
        }

        h1, h2 {
            font-weight: bold;
            font-style: italic;
        }

        .social-container {
            display: flex;
            flex-direction: column;
            gap: 15px; 
            margin-top: 20px;
        }

        .social-link {
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            transition: all 0.3s ease; /* Smooth hover effect */
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="live-clock"></div>

    <!-- Added height="100" to match width for a perfect circle -->
    <img src="images/icon-512.png" alt="Profile" class="circle-logo" width="100" height="100">
    <h1>Prat's Webpage</h1>
    <h2>Created by Pratik Thapa</h2>

    <div class="social-container">
        <!-- Removed the extra "social-link:hover" class here -->
        <a href="https://www.youtube.com/@ASTRO-hc8pu" target="_blank" class="social-link">
            <img src="images/icon-512.png" width="20" height="20" alt="YouTube" class="circle_logo1"> Astro Macenza 
        </a>
        <a href="https://www.instagram.com/p/CxvjeaLvL2o/..." target="_blank" class="social-link">
            <img src="images/aaa-jpg.jpg" width="20" height="20" alt="Instagram" class="circle_logo1"> The_astro_gamer
        </a>
    </div>

    <script>
      function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerHTML = now.toLocaleTimeString();
      }
      setInterval(updateClock, 1000);
      updateClock();
    </script>
</body>
</html>
