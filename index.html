<!DOCTYPE html>
<html lang="en">
<head>
    <title>Prat's Webpage</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;   
            align-items: center;       /* Centers horizontally */
            justify-content: center;    /* Centers vertically */
            min-height: 100vh;         
            background-image: linear-gradient(to bottom, violet, pink, blue);
            font-family: cursive, Impact, Haettenschweiler;
            text-align: center;
        }

        /* Styling for the Clock */
        #live-clock {
            font-size: 24px;
            font-weight: bold;   /* Bold */
            font-style: italic;  /* Tilted */
            margin-bottom: 20px;
            color: white;
        }

        h1, h2 {
            font-weight: bold;
            font-style: italic;
        }

        .social-container {
            display: flex;
            flex-direction: column;
            gap: 15px; 
            margin-top: 20px;
        }

        /* Make links look like buttons */
        .social-link {
            text-decoration: none;
            color: black;
            font-weight: bold;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
        }
        .social-link:hover {
    background: rgba(255, 255, 255, 0.5); /* Gets lighter */
    transform: scale(1.05);               /* Grows 5% */
    transition: all 0.3s ease;            /* Makes it smooth */
}
Use 
    </style>
</head>
<body>

    <!-- 1. Live Clock -->
    <div id="live-clock"></div>

    <!-- 2. Profile Image & Header -->
    <img src="images/icon-512.png" alt="Profile" class="circle-logo" width="100">
    <h1>Prat's Webpage</h1>
    <h2>Created by Pratik Thapa</h2>

    <!-- 3. Social Media Links -->
    <div class="social-container">
        <a href="https://www.youtube.com/@ASTRO-hc8pu" target="_blank" class="social-link" class="social-link:hover">
            <img src="images/icon-512.png" width="20" height="20" alt="YouTube" class="circle_logo1"> Astro Macenza 
        </a>
        <a href="https://www.instagram.com/p/CxvjeaLvL2o/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA%3D%3D" target="_blank" class="social-link" class="social-link:hover">
            <img src="images/aaa-jpg.jpg" width="20" height="20" alt="Instagram" class="circle_logo1"> The_astro_gamer
        </a>
    </div>

    <script>
      function updateClock() {
        const now = new Date();
        document.getElementById('live-clock').innerHTML = now.toLocaleTimeString();
      }
      setInterval(updateClock, 1000);
      updateClock();
    </script>
    <script src="Create.js"></script>
</body>
</html>
